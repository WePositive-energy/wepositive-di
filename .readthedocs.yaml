# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      # Install Poetry inside the RTD virtualenv
      - pip install poetry
    post_install:
      # Install your project + docs deps
      # If you use dependency groups:
      - poetry install --with docs
      # If you need dev too:
      # - poetry install --with dev,docs
    build:
      # Build into RTD’s expected output directory
      html:
        - poetry run mkdocs build --clean --site-dir $READTHEDOCS_OUTPUT/html
