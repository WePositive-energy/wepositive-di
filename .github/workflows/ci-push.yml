name: Publish Python package
on:
  push:
    branches:
      - dev
      - main
      - release/*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Always run each push so every package version can be tagged and published.
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  poetry:
    # Always run on push except for dependabot PRs.
    # Check actor (auto-merge), head_commit author (squash/rebase merge), and
    # head_commit message (merge commit includes the dependabot/ branch name).
    if: >-
      github.actor != 'dependabot[bot]' &&
      github.event.head_commit.author.username != 'dependabot[bot]' &&
      !contains(github.event.head_commit.message, 'dependabot/')
    outputs:
      version: ${{ steps.version.outputs.version }}
      pre_release: ${{ steps.pre_release.outputs.pre_release }}
      repository: ${{ steps.publish_policy.outputs.repository }}
      should_publish: ${{ steps.publish_policy.outputs.should_publish }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install packaging
      - uses: abatilo/actions-poetry@v3
      - uses: actions/cache@v4
        name: Setup cache
        with:
          path: ./.venv
          key: poetry-lock-${{ hashFiles('poetry.lock') }}
          # We always set "in-project" in poetry.toml to ensure a local .venv, as
          # we require that for pyright and other pre-commit hooks.
      - id: version
        run: echo "version=`poetry version --short --no-interaction`" >> $GITHUB_OUTPUT
      - id: package
        run: echo "package=`poetry version --no-interaction | grep -o '[.[:alnum:]_-]\+$'`" >> $GITHUB_OUTPUT
      - id: pre_release
        name: Is the version pre-release
        run: python -c "from packaging import version;print('pre_release=1') if version.parse('${{ steps.version.outputs.version }}').is_prerelease else print('pre_release=0')" >> $GITHUB_OUTPUT
      - id: publish_policy
        name: Validate branch version policy
        run: |
          python <<'PY'
          import os
          from packaging.version import Version

          branch = os.environ["GITHUB_REF_NAME"]
          version = Version("${{ steps.version.outputs.version }}")
          output_path = os.environ["GITHUB_OUTPUT"]

          repository = "testpypi"
          should_publish = "1"
          reason = ""

          if branch == "main":
              if version.is_prerelease:
                  should_publish = "0"
                  reason = f"main publishes to PyPI only for stable versions, got {version}"
              else:
                  repository = "pypi"
          elif branch == "dev":
              if version.pre is None or version.pre[0] != "a":
                  should_publish = "0"
                  reason = f"dev publishes to TestPyPI only for alpha versions, got {version}"
          elif branch.startswith("release/"):
              if version.is_prerelease:
                  if version.pre is None or version.pre[0] != "rc":
                      should_publish = "0"
                      reason = (
                          "release/* publishes prereleases to TestPyPI only for rc versions, "
                          f"got {version}"
                      )
              else:
                  should_publish = "0"
                  reason = (
                      f"{branch} has stable version {version}; "
                      "package publishing is skipped until main."
                  )
          else:
              should_publish = "0"
              reason = f"Unsupported publish branch: {branch}"

          with open(output_path, "a", encoding="utf-8") as output:
              print(f"repository={repository}", file=output)
              print(f"should_publish={should_publish}", file=output)

          if should_publish == "0":
              print(reason)
          PY
      - name: Build package
        if: steps.publish_policy.outputs.should_publish == '1'
        run: poetry build --no-interaction
      - uses: actions/upload-artifact@v4
        if: steps.publish_policy.outputs.should_publish == '1'
        with:
          name: python-package
          path: dist/
  git-tag:
    needs: [poetry]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
      - name: Tag Poetry version
        if: needs.poetry.outputs.should_publish == '1'
        run: |
          version="${{ needs.poetry.outputs.version }}"
          if git rev-parse --verify --quiet "refs/tags/${version}"; then
            tagged_commit="$(git rev-list -n 1 "${version}")"
            if [[ "${tagged_commit}" != "${GITHUB_SHA}" ]]; then
              echo "Tag ${version} already exists on ${tagged_commit}, not ${GITHUB_SHA}" >&2
              exit 1
            fi
            echo "Tag ${version} already exists on this commit"
          else
            git tag "${version}"
            git push origin "${version}"
          fi
  poetry-build-publish:
    needs: [poetry, git-tag]
    if: >-
      needs.poetry.outputs.should_publish == '1' &&
      github.actor != 'dependabot[bot]' &&
      github.event.head_commit.author.username != 'dependabot[bot]' &&
      !contains(github.event.head_commit.message, 'dependabot/')
    runs-on: ubuntu-22.04
    environment: ${{ needs.poetry.outputs.repository }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/
      - name: Publish to PyPI
        if: needs.poetry.outputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Publish to TestPyPI
        if: needs.poetry.outputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
