site_name: WePositive DI
site_description: Dependency injection and context management helpers for Python applications.
repo_url: https://github.com/WePositive-energy/wepositive-di
docs_dir: docs
site_dir: docs_html
use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: light green
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members: true
            members_order: source
            inherited_members: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Providers: providers.md
  - Context Management: context-management.md
  - Overrides & Testing: overrides-testing.md
  - Deployment: deployment.md
  - API Reference:
      - Dependency Injection: api/di.md
      - Provider Classes: api/providers.md
      - Context Storage: api/context.md
  - Development: Development.md
